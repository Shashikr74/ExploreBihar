<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register – Explore Bihar</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/register.css">
</head>

<body class="register-page">

<section class="register-container">
    <h2>📝 First Time Registration</h2>

    <form id="registerForm">

        <input type="text" id="username" placeholder="User Name" autocomplete="off">

        <select id="country">
            <option value="" disabled selected>Choose Country</option>
            <option value="India">India</option>
            <option value="Nepal">Nepal</option>
        </select>

        <input type="text" id="mobile" placeholder="Mobile Number" maxlength="10">

        <select id="state">
            <option value="" disabled selected>Choose State</option>
            <option value="Bihar">Bihar</option>
            <option value="UP">Uttar Pradesh</option>
            <option value="Jharkhand">Jharkhand</option>
        </select>

        <input type="password" id="password" placeholder="Password">
        <input type="password" id="confirm" placeholder="Confirm Password">

        <button type="submit">Register</button>

        <p id="msg"></p>
     <div class="login-link">
        <p>Already registered?</p>
        <button type="button" id="goLogin">Login</button>
     </div>

    </form>
</section>

<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const msg = document.getElementById("msg");
    msg.style.color = "red";

    const username = document.getElementById("username").value.trim();
    const country  = document.getElementById("country").value;
    const mobile   = document.getElementById("mobile").value.trim();
    const state    = document.getElementById("state").value;
    const password = document.getElementById("password").value;
    const confirm  = document.getElementById("confirm").value;

    if (
        username === "" ||
        country === "" ||
        mobile === "" ||
        state === "" ||
        password === "" ||
        confirm === ""
    ) {
        msg.innerText = "All fields are required!";
        return;
    }

    if (password !== confirm) {
        msg.innerText = "Password not matched!";
        return;
    }

    const userData = {
        username,
        country,
        mobile,
        state,
        password
    };

    try {
        const res = await fetch("http://localhost:3000/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(userData)
        });

        const data = await res.json();

        if (!res.ok) {
            msg.innerText = data.message || "Registration failed!";
            return;
        }

        msg.style.color = "green";
        msg.innerText = "Registration Successful! Redirecting...";

        setTimeout(() => {
            window.location.href = "/login.html";
        }, 1200);

    } catch (err) {
        msg.innerText = "Server not running!";
    }
});
</script>
<script>
document.getElementById("goLogin").addEventListener("click", () => {
    window.location.href = "login.html";
});
</script>

</body>
</html>
