<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Choose Location | Explore Bihar</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/common.css">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
        url("images/pic.jpg");
    background-size: cover;
    background-position: center;
    min-height: 100vh;
}

/* HEADER */
header{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:70px;
    background:#fff;
    z-index:1000;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

/* LOCATION SECTION */
.location-wrapper{
    padding-top:100px;
}

.location-box{
    width:60%;
    margin:20px auto;
    background:#fff;
    padding:25px;
    border-radius:12px;
}

.location-box input{
    width:48%;
    padding:10px;
    margin-right:10px;
}

#distance{
    margin-top:15px;
    font-weight:bold;
}

#map{
    width:60%;
    height:350px;
    margin:20px auto;
    border-radius:12px;
}

/* NEXT BUTTON */
.next-btn{
    display:block;
    margin:30px auto;
    padding:12px 30px;
    font-size:16px;
    font-weight:bold;
    background:#ff5722;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.book-btn {
    background: linear-gradient(135deg, #ff5722, #ff784e);
    padding: 10px 18px;
    font-weight: bold;
}

.book-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.25);
}
</style>
</head>

<body>

<header>
    <div class="header-container">
        <h2>Explore Bihar</h2>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Logout</a>
        </nav>
    </div>
</header>

<div class="location-wrapper">

    <div class="location-box">
        <h3>Choose Location (via Map)</h3>

        <input id="start" type="text" placeholder="Start Location">
        <input id="end" type="text" placeholder="End Location">

        <div id="distance">Distance: 0 KM</div>
    </div>

    <div id="map"></div>

    <!-- TEMPORARY NEXT -->
    <button class="next-btn" onclick="goNext()">Next</button>

</div>

<script>
let map, directionsService, directionsRenderer;

function initMap(){
    map = new google.maps.Map(document.getElementById("map"),{
        zoom:7,
        center:{lat:25.0961,lng:85.3131}
    });

    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer();
    directionsRenderer.setMap(map);

    const startAuto = new google.maps.places.Autocomplete(
        document.getElementById("start")
    );
    const endAuto = new google.maps.places.Autocomplete(
        document.getElementById("end")
    );

    startAuto.addListener("place_changed", calculateRoute);
    endAuto.addListener("place_changed", calculateRoute);
}

function calculateRoute(){
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;

    if(!start || !end) return;

    directionsService.route({
        origin:start,
        destination:end,
        travelMode:"DRIVING"
    },function(result,status){
        if(status === "OK"){
            directionsRenderer.setDirections(result);
            const km = result.routes[0].legs[0].distance.text;
            document.getElementById("distance").innerText =
                "Distance: " + km;
        }
    });
}

/* TEMPORARY BYPASS (API key ke bina) */
function goNext(){
    window.location.href = "vehicle-option.html";
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&callback=initMap" async defer></script>

</body>
</html>
